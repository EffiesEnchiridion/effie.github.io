<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      line-height: 1.8;
      color: #222;
      background: #faf8f2;
    }

    h1, h2, h3 {
      line-height: 1.3;
    }

    a {
      color: #6b4e3d;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    code, pre {
      font-family: "SFMono-Regular", Menlo, Consolas, monospace;
    }

    pre {
      padding: 12px;
      overflow-x: auto;
      background: #f0ece2;
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
